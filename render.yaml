services:
  - type: web
    name: gestione-scontrini
    env: python
    buildCommand: pip install -r requirements.txt
    startCommand: gunicorn wsgi:app
    envVars:
      - key: PYTHON_VERSION
        value: 3.9
      - key: FLASK_APP
        value: gestione_scontrini.py
      - key: SECRET_KEY
        value: "metti-una-chiave-segreta-qui"