<!DOCTYPE html>
<html lang="it">
<head>
  <meta charset="utf-8">
  <title>Login - Gestione Scontrini</title>
  <style>
    .login-box { max-width: 420px; margin: 40px auto; background: #fff; padding: 20px; border-radius: 8px; box-shadow: 0 2px 8px rgba(0,0,0,0.1); }
    .form-group { margin-bottom: 12px; }
    input[type="text"], input[type="password"] { width: 100%; padding: 8px; border: 1px solid #ddd; border-radius: 4px; box-sizing: border-box; }
    .btn { background: #007bff; color: white; padding: 8px 14px; border-radius: 4px; text-decoration: none; border: none; cursor: pointer; }
    .error { color: #b00020; margin-bottom: 10px; }
  </style>
</head>
<body>
  <div class="container">
    <h1>Login</h1>
    <div class="login-box">
      {% if error %}
        <div class="error">{{ error }}</div>
      {% endif %}
      <form method="post" action="{{ url_for('login') }}">
        <div class="form-group">
          <label for="username">Username</label>
          <input id="username" name="username" type="text" required autofocus>
        </div>
        <div class="form-group">
          <label for="password">Password</label>
          <input id="password" name="password" type="password" required>
        </div>
        <div>
          <button class="btn" type="submit">Accedi</button>
          <a href="{{ url_for('index') }}" class="btn" style="background:#6c757d; margin-left:8px;">Annulla</a>
        </div>
      </form>
    </div>
  </div>
</body>
</html>
