{% extends "base.html" %}
{% block title %}Aggiungi scontrino{% endblock %}

{% block content %}
<div class="row justify-content-center">
  <div class="col-md-8">
    <h2>Aggiungi Scontrino</h2>
    <form method="post" action="{{ url_for('aggiungi_scontrino') }}">
      <div class="mb-3">
        <label for="data_scontrino" class="form-label">Data scontrino</label>
        <input type="date" class="form-control" id="data_scontrino" name="data_scontrino" required>
      </div>

      <div class="mb-3">
        <label for="nome_scontrino" class="form-label">Nome / Descrizione</label>
        <input type="text" class="form-control" id="nome_scontrino" name="nome_scontrino" maxlength="255" required>
      </div>

      <div class="row">
        <div class="col-md-6 mb-3">
          <label for="importo_versare" class="form-label">Importo da versare (€)</label>
          <input type="text" class="form-control" id="importo_versare" name="importo_versare" required placeholder="0.00">
        </div>
        <div class="col-md-6 mb-3">
          <label for="importo_incassare" class="form-label">Importo da incassare (€)</label>
          <input type="text" class="form-control" id="importo_incassare" name="importo_incassare" required placeholder="0.00">
        </div>
      </div>

      <div class="d-flex gap-2">
        <button type="submit" class="btn btn-primary">Aggiungi</button>
        <a class="btn btn-secondary" href="{{ url_for('lista_scontrini') }}">Annulla</a>
      </div>
    </form>
  </div>
</div>
{% endblock %}
